    <header class="header" style="margin-bottom: 3%;">
        <img src="/Un Neurosite/images/LogoMain/NeuroBotix-1024275.png" alt="Neurobotix Logo" width="56%" height="20%">
    </header>

    <main>
        <div class="contact-content">
            <h2 class="contact-title">Contactează-ne</h2>
            
            <div class="contact-left">
                <div class="contact-info">
                    <div class="contact-item">
                        <i class="fas fa-envelope"></i>
                        <span>neurobotix@cnmv.ro</span>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-school"></i>
                        <span>Colegiul Național „Mihai Viteazul", București</span>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>Bulevardul Pache Protopopescu 62, București</span>
                    </div>
                </div>
                
                <div class="map-container">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2848.695017468659!2d26.122550876678076!3d44.439417901226726!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40b1ff2ddb84534b%3A0x876cf63f515f022e!2sColegiul%20Na%C8%9Bional%20%22Mihai%20Viteazul%22!5e0!3m2!1sen!2sro!4v1716576050066!5m2!1sen!2sro" width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>

            <div class="contact-right">
                <form class="contact-form" id="contactForm">
                    <div class="form-group">
                        <input type="text" id="name" name="name" placeholder="Nume" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" name="email" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <textarea id="message" name="message" placeholder="Mesaj" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Trimite</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-contact-details">
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <span>+40 123 456 789</span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <a href="mailto:neurobotix@cnmv.ro">neurobotix@cnmv.ro</a>
                </div>
            </div>
            <div class="footer-copyright">
                © 2024 Neurobotix. All rights reserved.
            </div>

              <a href="https://www.tiktok.com/@neurobotix_ftc" target="_blank" class="social-icon"><img src="/Un Neurosite/images/Logos (footer)/tiktok-b38fb6f1.png" alt="TikTok"></a>
              <a href="#" target="_blank" class="social-icon"><img src="/Un Neurosite/images/Logos (footer)/linkedin.png" alt="LinkedIn"></a>
              <a href="#" target="_blank" class="social-icon"><img src="/Un Neurosite/images/Logos (footer)/github.png" alt="GitHub"></a>
              <a href="#" target="_blank" class="social-icon"><img src="/Un Neurosite/images/Logos (footer)/twitter.png" alt="Twitter"></a>
            </div>
        </div>
